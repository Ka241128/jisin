<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイム地震情報モニター</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: #0d0e12;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 380px;
            background: #15171e;
            border-right: 1px solid #262933;
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        header {
            background-color: #1f222b;
            padding: 15px 20px;
            border-bottom: 1px solid #262933;
        }
        header h2 { margin: 0; font-size: 18px; color: #e2e8f0; }

        #status-indicator {
            font-size: 11px;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 5px;
        }
        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            70% { box-shadow: 0 0 0 5px rgba(74, 222, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        #voice-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin-top: 8px;
            font-weight: bold;
        }
        #voice-btn.active { background: #ef4444; }

        .history-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .history-title {
            font-size: 13px;
            color: #94a3b8;
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        .eq-card {
            background: #1f222b;
            border: 1px solid #262933;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .eq-card:hover {
            border-color: #3b82f6;
            background: #252934;
        }
        .eq-card.latest {
            border-left: 5px solid #ef4444;
            border-color: rgba(239, 68, 68, 0.4);
            background: #221a22;
        }

        .eq-time { font-size: 11px; color: #94a3b8; margin: 0; }
        .eq-place { font-size: 16px; font-weight: bold; margin: 4px 0; color: #f8fafc; }
        .eq-meta { display: flex; justify-content: space-between; font-size: 13px; margin-top: 6px; }
        
        .tsunami-info {
            font-size: 12px;
            margin-top: 5px;
            font-weight: bold;
        }
        .tsunami-none { color: #38bdf8; }
        .tsunami-alert { color: #f43f5e; }

        .scale-badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            color: #fff;
            font-size: 12px;
        }

        #map {
            flex: 1;
            height: 100%;
            background-color: #0d0e12;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 45%; }
            #map { height: 55%; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <header>
            <h2>地震情報モニター</h2>
            <div id="status-indicator">
                <div class="pulse-dot"></div>
                <span id="status-text">リアルタイム監視中</span>
            </div>
            <button id="voice-btn" onclick="toggleVoice()">🔊 音声読み上げ: オフ</button>
        </header>
        
        <div class="history-container">
            <p class="history-title">■ 直近の地震（過去5件）</p>
            <div id="earthquake-list">データを読み込み中...</div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        const southWest = L.latLng(20, 118);
        const northEast = L.latLng(52, 152);
        const bounds = L.latLngBounds(southWest, northEast);

        const map = L.map('map', { 
            zoomControl: true,
            maxBounds: bounds,
            maxBoundsViscosity: 1.0,
            minZoom: 4,
            maxZoom: 10
        }).setView([36.2048, 138.2529], 5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap & CartoDB'
        }).addTo(map);

        let currentMarker;
        let earthquakeHistory = [];
        let isVoiceEnabled = false;

        function toggleVoice() {
            isVoiceEnabled = !isVoiceEnabled;
            const btn = document.getElementById('voice-btn');
            if (isVoiceEnabled) {
                btn.innerText = "🔊 音声読み上げ: オン";
                btn.classList.add('active');
                speak("音声読み上げが有効になりました。");
            } else {
                btn.innerText = "🔊 音声読み上げ: オフ";
                btn.classList.remove('active');
            }
        }

        function speak(text) {
            if (!isVoiceEnabled) return;
            window.speechSynthesis.cancel();
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            uttr.rate = 1.1;
            window.speechSynthesis.speak(uttr);
        }

        function parseScale(scaleNum) {
            const scales = { 10:"1", 20:"2", 30:"3", 40:"4", 45:"5弱", 50:"5強", 55:"6弱", 60:"6強", 70:"7" };
            return scales[scaleNum] || "不明";
        }

        function parseTsunami(domesticTsunami) {
            switch (domesticTsunami) {
                case "None":
                    return { text: "この地震による津波の心配はありません。", class: "tsunami-none", speech: "この地震による津波の心配はありません。" };
                case "Unknown":
                    return { text: "津波の影響は不明です。", class: "tsunami-alert", speech: "津波の影響は不明です。情報に注意してください。" };
                case "Checking":
                    return { text: "津波の影響を調査中です。", class: "tsunami-alert", speech: "津波の影響を調査中です。" };
                case "NonEffective":
                    return { text: "若干の海面変動があるかもしれませんが、被害の心配はありません。", class: "tsunami-none", speech: "若干の海面変動があるかもしれませんが、被害の心配はありません。" };
                case "Watch":
                    return { text: "津波注意報が発表されています！", class: "tsunami-alert", speech: "津波注意報が発表されています。海岸から離れてください。" };
                case "Warning":
                    return { text: "大津波警報または津波警報が発表されています！！", class: "tsunami-alert", speech: "津波警報または大津警報が発表されています！ただちに高いところへ避難してください！" };
                default:
                    return { text: "津波情報は提供されていません。", class: "tsunami-none", speech: "" };
            }
        }

        function getScaleBadgeColor(scaleNum) {
            if (scaleNum >= 50) return "#ef4444";
            if (scaleNum >= 40) return "#f97316";
            if (scaleNum >= 30) return "#eab308";
            return "#3b82f6";
        }

        function focusMap(lat, lng, name, scaleStr) {
            if (lat === -1 || lng === -1) return;
            if (currentMarker) map.removeLayer(currentMarker);
            
            currentMarker = L.circleMarker([lat, lng], {
                radius: 12, fillColor: "#ef4444", color: "#b91c1c", weight: 2, opacity: 1, fillOpacity: 0.8
            }).addTo(map);

            currentMarker.bindPopup(`<b>震源地: ${name}</b><br>最大震度: 震度${scaleStr}`).openPopup();
            map.flyTo([lat, lng], 6, { duration: 1.2 });
        }

        function renderList() {
            const listDiv = document.getElementById('earthquake-list');
            listDiv.innerHTML = "";

            earthquakeHistory.slice(0, 5).forEach((item, index) => {
                const eq = item.earthquake;
                const info = eq.hypocenter;
                const scaleStr = parseScale(eq.maxScale);
                const badgeColor = getScaleBadgeColor(eq.maxScale);
                const tsunamiObj = parseTsunami(eq.domesticTsunami);
                const isLatest = index === 0 ? "latest" : "";

                const card = document.createElement('div');
                card.className = `eq-card ${isLatest}`;
                card.innerHTML = `
                    <p class="eq-time">${eq.time} 発生</p>
                    <p class="eq-place">${info.name}</p>
                    <div class="eq-meta">
                        <span class="scale-badge" style="background-color: ${badgeColor}">震度 ${scaleStr}</span>
                        <span>M${info.magnitude} / 深さ${info.depth === -1 ? '不明' : info.depth + 'km'}</span>
                    </div>
                    <div class="tsunami-info ${tsunamiObj.class}">⚠️ ${tsunamiObj.text}</div>
                `;

                card.onclick = () => {
                    focusMap(info.latitude, info.longitude, info.name, scaleStr);
                };

                listDiv.appendChild(card);
            });
        }

        // ★【修正点】中継プロキシを完全撤去。安全なhttpsサイトから直接APIを叩く一番クリーンな接続
        const apiUrl = 'https://api.p2pquake.net/v2/history?codes=551&limit=5';

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                if (data && data.length > 0) {
                    earthquakeHistory = data;
                    renderList();
                    const latest = data[0].earthquake;
                    focusMap(latest.hypocenter.latitude, latest.hypocenter.longitude, latest.hypocenter.name, parseScale(latest.maxScale));
