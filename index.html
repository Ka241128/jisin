<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART QUAKE VIEWER</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Helvetica Neue', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background-color: #000; color: #fff; overflow: hidden;
        }
        #map {
            width: 100vw; height: 100vh; position: absolute;
            top: 0; left: 0; z-index: 1; background-color: #111;
        }
        .leaflet-layer {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }
        #info-overlay {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(15, 15, 20, 0.85);
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; padding: 20px; z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); box-sizing: border-box;
            display: flex; flex-direction: column; gap: 15px;
        }
        #status-indicator {
            font-size: 12px; color: #4ade80; display: flex; align-items: center; gap: 8px; letter-spacing: 1px;
        }
        .pulse-dot {
            width: 8px; height: 8px; background-color: #4ade80; border-radius: 50%;
            box-shadow: 0 0 8px #4ade80; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }
        .eq-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .eq-title { font-size: 14px; color: #9ca3af; margin: 0; }
        .tsunami-badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        .tsunami-none { background-color: #374151; color: #d1d5db; }
        .tsunami-warning { background-color: #ef4444; color: #fff; animation: blink 1s infinite alternate; }
        .eq-place { font-size: 24px; font-weight: bold; margin: 0 0 10px 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .eq-details { display: flex; justify-content: space-between; font-size: 16px; }
        .scale-strong { color: #f87171; font-weight: bold; font-size: 20px; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.5; } }
        #history-list {
            display: flex; flex-direction: column; gap: 8px; max-height: 150px;
            overflow-y: auto; border-top: 1px dashed rgba(255, 255, 255, 0.2); padding-top: 15px;
        }
        #history-list::-webkit-scrollbar { width: 4px; }
        #history-list::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; color: #d1d5db; background: rgba(255, 255, 255, 0.05);
            padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: background 0.2s;
        }
        .history-item:hover { background: rgba(255, 255, 255, 0.1); }
        .history-scale { font-weight: bold; color: #f87171; width: 40px; }
        .history-place { flex-grow: 1; margin-left: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-time { font-size: 11px; color: #9ca3af; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="info-overlay">
        <div id="status-indicator">
            <div class="pulse-dot"></div>
            <span id="status-text">システム起動中...</span>
        </div>
        <div id="eq-content">データを取得しています...</div>
        <div id="history-list"></div>
    </div>

    <script>
        const japanBounds = [[20.0, 122.0], [46.0, 154.0]];
        let map = L.map('map', {
            zoomControl: false, maxBounds: japanBounds, maxBoundsViscosity: 1.0, minZoom: 4, maxZoom: 10
        }).setView([36.2048, 138.2529], 5);

        L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank">国土地理院</a>'
        }).addTo(map);

        let currentMarker;
        let eqDataList = [];

        function parseScale(scaleNum) {
            const scales = { 10:"1", 20:"2", 30:"3", 40:"4", 45:"5弱", 50:"5強", 55:"6弱", 60:"6強", 70:"7" };
            return scales[scaleNum] || "不明";
        }

        function parseTsunami(tsunamiType) {
            switch(tsunamiType) {
                case "None": return { text: "津波の心配なし", class: "tsunami-none" };
                case "Unknown": return { text: "津波有無は不明", class: "tsunami-none" };
                case "Checking": return { text: "津波影響を調査中", class: "tsunami-warning" };
                case "NonDestructive": return { text: "若干の海面変動あり", class: "tsunami-none" };
                case "Warning": return { text: "津波警報等 発表中", class: "tsunami-warning" };
                default: return { text: "情報なし", class: "tsunami-none" };
            }
        }

        function formatTime(timeStr) {
            if (!timeStr) return "不明";
            const date = new Date(timeStr);
            return isNaN(date.getTime()) ? "不明" : `${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        function renderUI() {
            if (!eqDataList || eqDataList.length === 0) return;

            const latestEq = eqDataList[0];
            const info = latestEq.hypocenter || {};
            const tsunamiInfo = parseTsunami(latestEq.domesticTsunami);
            
            document.getElementById('eq-content').innerHTML = `
                <div class="eq-title-row">
                    <p class="eq-title">${formatTime(latestEq.time)} 発生</p>
                    <span class="tsunami-badge ${tsunamiInfo.class}">${tsunamiInfo.text}</span>
                </div>
                <p class="eq-place">${info.name || '震源情報なし'}</p>
                <div class="eq-details">
                    <span>最大震度: <span class="scale-strong">${parseScale(latestEq.maxScale)}</span></span>
                    <span>M ${info.magnitude === -1 ? '不明' : info.magnitude} / 深さ ${info.depth === -1 ? '不明' : info.depth + 'km'}</span>
                </div>
            `;

            if (info.latitude && info.longitude && info.latitude !== -1) {
                if (currentMarker) map.removeLayer(currentMarker);
                currentMarker = L.circleMarker([info.latitude, info.longitude], {
                    radius: 12, fillColor: "#ef4444", color: "#b91c1c", weight: 2, opacity: 1, fillOpacity: 0.8
                }).addTo(map);
                map.flyTo([info.latitude, info.longitude], 7, { duration: 1.5 });
            }

            const historyContainer = document.getElementById('history-list');
            historyContainer.innerHTML = '';
            eqDataList.forEach((eq) => {
                const hInfo = eq.hypocenter || {};
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span class="history-scale">震度${parseScale(eq.maxScale)}</span>
                    <span class="history-place">${hInfo.name || '不明'}</span>
                    <span class="history-time">${formatTime(eq.time)}</span>
                `;
                div.onclick = () => {
                    if (hInfo.latitude && hInfo.latitude !== -1) map.flyTo([hInfo.latitude, hInfo.longitude], 7, { duration: 1.0 });
                };
                historyContainer.appendChild(div);
            });
        }

        fetch('https://api.p2pquake.net/v2/history?codes=551&limit=5')
            .then(res => res.json())
            .then(data => {
                if (data && data.length > 0) {
                    eqDataList = data.map(d => d.earthquake).filter(Boolean);
                    renderUI();
                }
            }).catch(err => console.error(err));

        const ws = new WebSocket('wss://api.p2pquake.net/v2/ws');
        ws.onopen = () => { document.getElementById('status-text').innerText = "リアルタイム監視中 (WebSocket)"; };
        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data && data.code === 551 && data.earthquake) {
                    eqDataList.unshift(data.earthquake);
                    if (eqDataList.length > 5) eqDataList.pop();
                    renderUI();
                }
            } catch(e) {}
        };
    </script>
</body>
</html>
