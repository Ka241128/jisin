            animation: eew-bg-blink 0.5s infinite alternate ease-in-out;
        }
        @keyframes eew-bg-blink { 
            from { background: rgba(220, 38, 38, 0.96); box-shadow: inset 0 0 100px rgba(0,0,0,0.5); }

        }

            "鹿児島県薩摩": [31.85, 130.40], "鹿児島県大隅": [31.45, 130.90], "種子島・屋久島地方": [30.50, 130.60], "奄美地方": [28.35, 129.50],
            "沖縄本島北部": [26.60, 128.00], "沖縄本島中南部": [26.25, 127.70], "宮古島地方": [24.80, 125.30], "八重山地方": [24.35, 124.15]
        };

        const japanBounds = [[20.0, 118.0], [47.0, 155.0]];
        let map = L.map('map', { zoomControl: false, maxBounds: japanBounds, maxBoundsViscosity: 1.0, minZoom: 4, maxZoom: 10, tap: L.Browser.mobile }).setView([36.2048, 138.2529], 5);
        L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/blank/{z}/{x}/{y}.png').addTo(map);
        L.control.zoom({ position: 'topright' }).addTo(map);

        let dynamicMappingGroup = L.layerGroup().addTo(map);
        let mixedDataList = [];
        let currentPlotItem = null;

        function updateClock() {
            const now = new Date();
            document.getElementById('current-clock').textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
        }
        setInterval(updateClock, 1000); updateClock();

        let currentX = 0, currentY = 0, currentScale = 1.0;
        let isDragging = false, startX, startY, baseOffsetX, baseOffsetY, baseScale = 1.0, startDistance = 0, hasMoved = false;
        const container = document.getElementById('info-container');
        const overlayElement = document.getElementById('info-overlay');

        function setInitialPosition() {
            const w = window.innerWidth, h = window.innerHeight;
            if (w < 768) { currentX = 0; currentY = h - (h * 0.45); } else { currentX = 35; currentY = h - 550; }
            updateTransform();
        }
        function updateTransform() { container.style.transform = `translate3d(${currentX}px, ${currentY}px, 0) scale(${currentScale})`; }

        function startDrag(e) {
            if (e.touches && e.touches.length > 1) { initPinch(e); return; }
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            startX = clientX; startY = clientY; baseOffsetX = currentX; baseOffsetY = currentY;
            isDragging = true; hasMoved = false;
            
            overlayElement.classList.remove('transparent-mode');
            
            document.addEventListener('mousemove', drag); document.addEventListener('touchmove', drag, { passive: false });
            document.addEventListener('mouseup', endDrag); document.addEventListener('touchend', endDrag);
            if(e.cancelable) e.preventDefault();
        }
        function drag(e) {
            if (e.touches && e.touches.length > 1) { handlePinch(e); return; }
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const dx = clientX - startX, dy = clientY - startY;
            if (Math.abs(dx) > 4 || Math.abs(dy) > 4) hasMoved = true;
            currentX = baseOffsetX + dx; currentY = baseOffsetY + dy; updateTransform();
            if(e.cancelable) e.preventDefault();
        }
        function endDrag(e) {
            if (!isDragging) return; isDragging = false;
            document.removeEventListener('mousemove', drag); document.removeEventListener('touchmove', drag);
            document.removeEventListener('mouseup', endDrag); document.removeEventListener('touchend', endDrag);
            if (!hasMoved) togglePanelContent();
        }
        function togglePanelContent() {
            const overlay = document.getElementById('info-overlay');
            overlay.style.display = (overlay.style.display === 'none') ? 'flex' : 'none';
            updateTransform();
        }
        function initPinch(e) { isDragging = false; baseScale = currentScale; startDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
        function handlePinch(e) {
            if (!e.touches || e.touches.length < 2) return; e.stopPropagation();
            const currentDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            if (startDistance <= 0) return;
            currentScale = Math.min(Math.max(0.55, baseScale * (currentDistance / startDistance)), 1.65); updateTransform();
            if(e.cancelable) e.preventDefault();
        }
        overlayElement.addEventListener('touchstart', (e) => { if(e.touches.length > 1) initPinch(e); }, {passive: false});
        overlayElement.addEventListener('touchmove', (e) => { if(e.touches.length > 1) handlePinch(e); }, {passive: false});
        window.addEventListener('DOMContentLoaded', setInitialPosition); window.addEventListener('resize', () => { if(!hasMoved) setInitialPosition(); });

        function parseScale(s) { const sc = {10:"1",20:"2",30:"3",40:"4",45:"5弱",50:"5強",55:"6弱",60:"6強",70:"7"}; return sc[s] || "不明"; }
        function parseTsunami(t) { const ts = {"None":"津波なし", "Unknown":"津波不明", "Checking":"津波調査中", "Warning":"津波注意報", "Watch":"津波警報"}; return ts[t] || "情報なし"; }
        function formatTime(t) { const d = new Date(t); return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`; }
        
        function getIntensityColor(scale) {
            if (scale >= 50) return "#ff4757"; 
            if (scale >= 40) return "#ffa502"; 
            if (scale >= 30) return "#eccc68";  
            if (scale >= 20) return "#70a1ff";  
            return "#2ed573";
        }

        function getIntensityStyle(scale) {
            if (scale >= 50) return { color: "#ff4757", radius: 13, opacity: 0.9 }; 
            if (scale >= 40) return { color: "#ffa502", radius: 11, opacity: 0.85 }; 
            if (scale >= 30) return { color: "#eccc68", radius: 9, opacity: 0.8 };  
            if (scale >= 20) return { color: "#70a1ff", radius: 7, opacity: 0.75 };  
            return { color: "#2ed573", radius: 5, opacity: 0.65 };                                 
        }

        let overlapTimer = null;
        function checkPanelOverlap(lat, lng) {
            const overlay = document.getElementById('info-overlay');
            if (overlay.style.display === 'none') return;

            const point = map.latLngToContainerPoint([lat, lng]);
            const rect = overlay.getBoundingClientRect();
            const buffer = 20; 
            
            if (point.x >= rect.left - buffer && point.x <= rect.right + buffer &&
                point.y >= rect.top - buffer && point.y <= rect.bottom + buffer) {
                
                overlay.classList.add('transparent-mode');
                
                if (overlapTimer) clearTimeout(overlapTimer);
                overlapTimer = setTimeout(() => {
                    overlay.classList.remove('transparent-mode');
                }, 5000);
            } else {
                overlay.classList.remove('transparent-mode');
                if (overlapTimer) clearTimeout(overlapTimer);
            }
        }

        map.on('moveend', function() {
            if (!currentPlotItem) return;
            dynamicMappingGroup.clearLayers();
            const info = currentPlotItem.earthquake?.hypocenter || {};
            const points = currentPlotItem.points || [];

            if (points.length > 0) {
                points.forEach(pt => {
                    let coords = null;
                    for (let key in subRegionCoordinates) { if (pt.addr === key || pt.addr.startsWith(key) || key.startsWith(pt.addr)) { coords = subRegionCoordinates[key]; break; } }
                    if (coords) {
                        const style = getIntensityStyle(pt.scale);
                        L.circleMarker(coords, { radius: style.radius, fillColor: style.color, color: "#ffffff", weight: 1.5, fillOpacity: style.opacity }).bindPopup(`<strong>${pt.addr}</strong><br>震度: ${parseScale(pt.scale)}`).addTo(dynamicMappingGroup);
                    }
                });
            }
            if (info.latitude && info.latitude !== -1) { 
                L.circleMarker([info.latitude, info.longitude], { radius: 14, fillColor: "#ff4757", color: "#fff", weight: 3, fillOpacity: 1 }).addTo(dynamicMappingGroup); 
                checkPanelOverlap(info.latitude, info.longitude);
            }
            document.getElementById('map').classList.remove('markers-fadeout');
            currentPlotItem = null;
        });

        function selectData(item) {
            if (!item) return;
            currentPlotItem = item;
            document.getElementById('map').classList.add('markers-fadeout');

            if (item.isEEW) {
                dynamicMappingGroup.clearLayers();
                document.getElementById('eq-content').innerHTML = `
                    <div class="eq-title-row"><p style="color:#ff6b6b;font-weight:bold;margin:0;">🚨 緊急地震速報</p></div>
                    <p class="eq-place">${item.place}</p>
                    <div class="eq-details"><span>強い揺れに警戒</span><span>${formatTime(item.time)}</span></div>`;
                document.getElementById('map').classList.remove('markers-fadeout');
                currentPlotItem = null;
                return;
            }

            const info = item.earthquake?.hypocenter || {};
            document.getElementById('eq-content').innerHTML = `
                <div class="eq-title-row"><p style="font-size:12px;color:#94a3b8;margin:0;">${formatTime(item.earthquake?.time || item.time)} 発生</p><span class="tsunami-badge tsunami-none">${parseTsunami(item.earthquake?.domesticTsunami)}</span></div>
                <p class="eq-place">${info.name || '震源情報なし'}</p>
                <div class="eq-details"><span>最大震度: <span class="scale-strong">${parseScale(item.earthquake?.maxScale)}</span></span><span>M ${info.magnitude === -1 || !info.magnitude ? '?' : info.magnitude}</span></div>`;
            
            if (info.latitude && info.latitude !== -1) {
                const targetZoom = window.innerWidth < 768 ? 5 : 6;
                setTimeout(() => { map.flyTo([info.latitude, info.longitude], targetZoom, { duration: 1.0 }); }, 100);
            } else { map.fire('moveend'); }
        }

        function updateDataList(newDataArray) {
            newDataArray.forEach(item => {
                const itemTime = new Date(item.earthquake?.time || item.time).getTime();
                const itemPlace = item.earthquake?.hypocenter?.name || item.place || "";
                const itemM = item.earthquake?.hypocenter?.magnitude || -1;
                const itemScale = item.earthquake?.maxScale || 0;

                const existingIndex = mixedDataList.findIndex(existing => {
                    if (item.id && existing.id && item.id === existing.id) return true;
                    if (item._id && existing._id && item._id === existing._id) return true;
                    
                    if (item.isEEW && existing.isEEW) {
                        const timeDiff = Math.abs(itemTime - new Date(existing.time).getTime());
                        return timeDiff < 180000 && (itemPlace === existing.place || itemPlace === "" || existing.place === "");
                    }

                    if (!item.isEEW && !existing.isEEW) {
                        const existingTime = new Date(existing.earthquake?.time || existing.time).getTime();
                        const existingPlace = existing.earthquake?.hypocenter?.name || existing.place || "";
                        const existingM = existing.earthquake?.hypocenter?.magnitude || -1;
                        const existingScale = existing.earthquake?.maxScale || 0;
                        
                        const isCloseTime = Math.abs(itemTime - existingTime) <= 90000;

                        if (isCloseTime) {
                            const isSamePlace = (itemPlace === existingPlace);
                            const isOnePlaceEmpty = (!itemPlace || itemPlace === '震源情報なし' || !existingPlace || existingPlace === '震源情報なし');

                            if (isSamePlace || isOnePlaceEmpty) {
                                if (itemM > 0 && existingM > 0 && Math.abs(itemM - existingM) > 0.2) return false; 
                                if (itemScale > 0 && existingScale > 0 && Math.abs(itemScale - existingScale) >= 10) return false; 
                                return true; 
                            }
                        }
                    }
                    return false;
                });

                if (existingIndex !== -1) {
                    const existingItem = mixedDataList[existingIndex];
                    const existingM = existingItem.earthquake?.hypocenter?.magnitude || -1;
                    const existingPointsCount = existingItem.points?.length || 0;
                    const itemPointsCount = item.points?.length || 0;

                    let itemScore = 0, existingScore = 0;
                    if (itemPlace && itemPlace !== '震源情報なし') itemScore += 10;
                    if (existingItem.earthquake?.hypocenter?.name && existingItem.earthquake.hypocenter.name !== '震源情報なし') existingScore += 10;
                    if (itemM > 0) itemScore += 5;
                    if (existingM > 0) existingScore += 5;
                    if (itemScale > 0) itemScore += 5;
                    if (existingItem.earthquake?.maxScale > 0) existingScore += 5;
                    itemScore += itemPointsCount * 0.1;
                    existingScore += existingPointsCount * 0.1;

                    if (itemScore >= existingScore) {
                        mixedDataList[existingIndex] = item;
                    }
                } else {
                    mixedDataList.push(item);
                }
            });

            mixedDataList.sort((a, b) => new Date(b.earthquake?.time || b.time).getTime() - new Date(a.earthquake?.time || a.time).getTime());
            
            if (mixedDataList.length > 15) {
                mixedDataList = mixedDataList.slice(0, 15);
            }
        }

        let lastFetchedId = null;

        async function fetchEarthquakeData() {
            try {
                const response = await fetch('https://api.p2pquake.net/v2/jma/quake?limit=20');
                if (!response.ok) throw new Error('API通信エラー');
                
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const latestId = data[0].id || data[0]._id;
                    
                    if (latestId !== lastFetchedId) {
                        lastFetchedId = latestId;
                        
                        updateDataList(data);
                        renderHistoryList();
                        
                        if (mixedDataList.length > 0) {
                            selectData(mixedDataList[0]);
                        }
                    }
                }
            } catch (error) {
                console.debug('データ確認中...', error);
            }
        }

        function renderHistoryList() {
            const listContainer = document.getElementById('history-list');
            if (!listContainer) return;
            
            listContainer.innerHTML = ''; 
            
            mixedDataList.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.onclick = () => selectData(item);
                
                const info = item.earthquake?.hypocenter || {};
                const timeStr = formatTime(item.earthquake?.time || item.time);
                const placeStr = info.name || item.place || '震源情報なし';
                const scaleNum = item.earthquake?.maxScale || 0;
                const scaleStr = parseScale(scaleNum);
                const color = getIntensityColor(scaleNum);
                
                div.innerHTML = `
                    <div class="history-scale" style="background-color: ${color}; color: #000;">震度 ${scaleStr}</div>
                    <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${placeStr}</div>
                    <div class="history-meta">
                        <span>${timeStr}</span>
                        <span>M${info.magnitude === -1 || !info.magnitude ? '?' : info.magnitude}</span>
                    </div>
                `;
                listContainer.appendChild(div);
            });
        }

        window.addEventListener('load', () => {
            fetchEarthquakeData();
            setInterval(fetchEarthquakeData, 500);
        });
    </script>
</body>
</html>
